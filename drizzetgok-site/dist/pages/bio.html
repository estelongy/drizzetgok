<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dr. İzzet Gök | Resmi Bağlantılar</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    
    .container {
      width: 100%;
      max-width: 420px;
    }
    
    /* Profile Section */
    .profile {
      text-align: center;
      margin-bottom: 32px;
    }
    
    .avatar {
      width: 96px;
      height: 96px;
      background: linear-gradient(135deg, #34d399 0%, #0d9488 100%);
      border-radius: 50%;
      margin: 0 auto 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 10px 40px rgba(13, 148, 136, 0.3);
    }
    
    .avatar span {
      color: white;
      font-size: 36px;
      font-weight: 700;
    }
    
    .profile h1 {
      font-size: 24px;
      font-weight: 700;
      color: #1e293b;
      margin-bottom: 4px;
    }
    
    .profile p {
      color: #64748b;
      font-size: 14px;
      margin-bottom: 12px;
    }
    
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 16px;
      background: #d1fae5;
      color: #047857;
      border-radius: 9999px;
      font-size: 13px;
      font-weight: 500;
    }
    
    .badge::before {
      content: '';
      width: 8px;
      height: 8px;
      background: #10b981;
      border-radius: 50%;
      animation: pulse 2s infinite;
    }
    
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    
    /* Links Section */
    .links {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 32px;
    }
    
    .link-btn {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 16px 20px;
      border-radius: 16px;
      text-decoration: none;
      color: white;
      font-weight: 600;
      transition: all 0.3s ease;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
    }
    
    .link-btn:hover {
      transform: scale(1.02);
      box-shadow: 0 10px 20px -5px rgba(0, 0, 0, 0.2);
    }
    
    .link-btn .icon {
      width: 40px;
      height: 40px;
      background: rgba(255, 255, 255, 0.2);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .link-btn span:last-child {
      flex: 1;
      text-align: center;
    }
    
    /* Button Colors */
    .btn-web { background: linear-gradient(135deg, #10b981 0%, #059669 100%); }
    .btn-whatsapp { background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%); }
    .btn-phone { background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%); }
    .btn-map { background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%); }
    .btn-services { background: linear-gradient(135deg, #a855f7 0%, #9333ea 100%); }
    .btn-instagram { 
      background: linear-gradient(135deg, #833ab4 0%, #fd1d1d 50%, #fcb045 100%); 
    }
    .btn-facebook { background: linear-gradient(135deg, #1877f2 0%, #166fe5 100%); }
    
    /* Info Card */
    .info-card {
      background: white;
      border-radius: 20px;
      padding: 24px;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
    }
    
    .info-item {
      display: flex;
      align-items: center;
      gap: 12px;
      color: #475569;
    }
    
    .info-item:first-child {
      margin-bottom: 16px;
    }
    
    .info-item svg {
      width: 20px;
      height: 20px;
      color: #10b981;
      flex-shrink: 0;
    }
    
    .info-item span {
      font-weight: 500;
    }
    
    /* Footer */
    .footer {
      text-align: center;
      margin-top: 32px;
      color: #94a3b8;
      font-size: 13px;
    }
    
    .footer p:last-child {
      margin-top: 4px;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Profile -->

      <div class="avatar">

      <h1>Dr. İzzet Gök</h1>

      <a href="/#hizmetler" class="link-btn btn-services">

          </svg>
        </div>
        <span>Hizmetlerimiz</span>
      </a>
      
      <a href="https://instagram.com/drizzetgok" target="_blank" rel="noopener" class="link-btn btn-instagram">

        <span>Instagram</span>

      <a href="https://facebook.com/drizzetgok" target="_blank" rel="noopener" class="link-btn btn-facebook">
        <div class="icon">
          <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"/>
          </svg>
        </div>
        <span>Facebook</span>
      </a>
    </div>
    
    <!-- Info Card -->
    <div class="info-card">
      <div class="info-item">
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/>
          <circle cx="12" cy="10" r="3"/>
        </svg>
        <span>Beylikdüzü, İstanbul</span>
      </div>
      <div class="info-item">
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <circle cx="12" cy="12" r="10"/>

    </div>
    
    <!-- Footer -->
    <div class="footer">
      <p>© 2026 Dr. İzzet Gök</p>
      <p>Tüm hakları saklıdır.</p>
    </div>
  </div>
</body>
</html>
